# See the pacman.conf(5) manpage for option and repository directives

[options]
HoldPkg     = pacman glibc
Architecture = auto
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Server = https://secux.tonightisthenight.site/$repo/os/$arch
Include = /etc/pacman.d/mirrorlist

[extra]
Server = https://secux.tonightisthenight.site/$repo/os/$arch
Include = /etc/pacman.d/mirrorlist

[secux-repo]
Server = https://secux.tonightisthenight.site/secux-repo
Server = https://kolbanidze-secux-repo.hf.space
